<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#33241a" />
  <title>Travis Picker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-bar">
    <h1>Travis Picker</h1>
    <span id="type-indicator" class="type-indicator"></span>
    <select id="theme" class="theme-select" aria-label="Theme"></select>
  </header>

  <main>
    <section id="grid" class="grid" aria-label="Pattern grid"></section>
  </main>

  <div class="controls">
    <!-- Row 1 is the only row whose contents change between chord modes; it
         always fills 3 slots so nothing below it ever shifts. -->
    <div class="control-row">
      <div class="field">
        <span>Chords</span>
        <div id="chord-mode" class="segmented" role="group" aria-label="Chord mode">
          <button type="button" data-mode="single" class="active">Single</button>
          <button type="button" data-mode="progression">Prog.</button>
        </div>
      </div>

      <label class="field span-2" id="field-chord">
        <span>Chord</span>
        <select id="chord"></select>
      </label>

      <label class="field" id="field-key" hidden>
        <span>Key</span>
        <select id="key"></select>
      </label>
      <label class="field" id="field-prog" hidden>
        <span>Progression</span>
        <select id="progression"></select>
      </label>
    </div>

    <div class="control-row">
      <label class="field">
        <span>Thumb</span>
        <select id="bass"></select>
      </label>
      <label class="field">
        <span>Chaos</span>
        <select id="chaos"></select>
      </label>
      <label class="field">
        <span>Pattern</span>
        <select id="pattern"></select>
      </label>
    </div>

    <div class="control-row">
      <div class="field">
        <span>Labels</span>
        <div id="label-mode" class="segmented" role="group" aria-label="Label mode">
          <button type="button" data-label="fret" class="active">Fret</button>
          <button type="button" data-label="pima">PIMA</button>
        </div>
      </div>
      <button id="generate" class="btn-primary span-2" type="button">Generate</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
