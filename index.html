<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#33241a" />
  <meta name="description" content="Random, playable Travis-picking practice patterns on a drum-machine grid." />
  <title>Travis Picker</title>

  <!-- PWA: installable + offline. iOS mostly ignores the manifest, so the
       apple-* tags and apple-touch-icon below are what actually make the
       home-screen install (standalone launch + icon) work on iPhone. -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Travis" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main>
    <div class="grid-bar">
      <span class="app-version" aria-label="App version">v1.0</span>
      <div class="grid-bar-info">
        <div id="loaded-name" class="loaded-name" hidden></div>
        <span id="type-indicator" class="type-indicator"></span>
      </div>
      <div class="grid-actions">
        <button id="edit-toggle" class="pill" type="button" aria-pressed="false"
                title="Toggle manual editing">✎ Edit</button>
        <button id="open-save" class="pill" type="button">Save</button>
        <button id="open-load" class="pill" type="button">Load</button>
      </div>
    </div>
    <section id="grid" class="grid" aria-label="Pattern grid"></section>
  </main>

  <!-- The only permanently-visible controls: the three things you reach for with
       a guitar in your hands. Everything else lives in the Options sheet, because
       the grid must fit on screen without scrolling on a small phone. -->
  <div class="controls">
    <div class="transport">
      <button id="play" class="btn-icon btn-play" type="button" aria-pressed="false"
              aria-label="Start metronome">▶</button>
      <input id="bpm" class="bpm-slider" type="range" min="40" max="240" step="1" value="90"
             aria-label="Tempo in beats per minute" />
      <output id="bpm-value" class="bpm-value" for="bpm">90</output>
      <button id="generate" class="btn-icon btn-roll" type="button"
              aria-label="Generate a new pattern" title="Generate">🎲</button>
      <button id="open-options" class="btn-icon" type="button"
              aria-label="Options" title="Options">⚙</button>
    </div>
  </div>

  <!-- Options: generation inputs (set between takes) + app-wide preferences. -->
  <div id="options-sheet" class="sheet" hidden>
    <div class="sheet-backdrop" data-close></div>
    <section class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="options-title">
      <header class="sheet-head">
        <h2 id="options-title">Options</h2>
        <button class="sheet-close" type="button" data-close aria-label="Close">✕</button>
      </header>

      <!-- Row 1 is the only row whose contents change between chord modes; it
           always fills 3 slots so nothing below it ever shifts. -->
      <div class="control-row">
        <div class="field">
          <span>Chords</span>
          <div id="chord-mode" class="segmented" role="group" aria-label="Chord mode">
            <button type="button" data-mode="single" class="active">Single</button>
            <button type="button" data-mode="progression">Prog.</button>
          </div>
        </div>

        <label class="field span-2" id="field-chord">
          <span>Chord</span>
          <select id="chord"></select>
        </label>

        <label class="field" id="field-key" hidden>
          <span>Key</span>
          <select id="key"></select>
        </label>
        <label class="field" id="field-prog" hidden>
          <span>Progression</span>
          <select id="progression"></select>
        </label>
      </div>

      <div class="control-row">
        <label class="field">
          <span>Thumb</span>
          <select id="bass"></select>
        </label>
        <label class="field">
          <span>Chaos</span>
          <select id="chaos"></select>
        </label>
        <label class="field">
          <span>Pattern</span>
          <select id="pattern"></select>
        </label>
      </div>

      <hr class="sheet-rule" />

      <div class="control-row">
        <label class="field span-2">
          <span>Note labels</span>
          <select id="label-mode"></select>
        </label>
        <label class="field">
          <span>Theme</span>
          <select id="theme"></select>
        </label>
      </div>
    </section>
  </div>

  <!-- Saved library: save the current pattern, or load/delete an existing one -->
  <div id="saved-sheet" class="sheet" hidden>
    <div class="sheet-backdrop" data-close></div>
    <section class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="saved-title">
      <header class="sheet-head">
        <h2 id="saved-title">Save</h2>
        <button class="sheet-close" type="button" data-close aria-label="Close">✕</button>
      </header>

      <div id="save-section">
        <div class="save-row">
          <input id="save-name" type="text" placeholder="Name this pattern" autocomplete="off" />
          <button id="save-btn" class="btn-primary" type="button">Save</button>
        </div>
        <p id="save-hint" class="save-hint"></p>
      </div>

      <ul id="saved-list" class="saved-list"></ul>
    </section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
