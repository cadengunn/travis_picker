<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#33241a" />
  <meta name="description" content="Random, playable Travis-picking practice patterns on a drum-machine grid." />
  <title>Travis Picker</title>

  <!-- PWA: installable + offline. iOS mostly ignores the manifest, so the
       apple-* tags and apple-touch-icon below are what actually make the
       home-screen install (standalone launch + icon) work on iPhone. -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Travis" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main>
    <!-- Header, two rows. Row 1: version + musical context (progression + key,
         shown in progression mode) + the pattern actions. Row 2: the pattern's
         name, which can be long, so it owns a full row of its own. -->
    <header class="app-head">
      <div class="ctx-row">
        <span class="app-version" aria-label="App version">v2.5.0</span>
        <span id="context" class="context" hidden></span>
        <div class="grid-actions">
          <button id="edit-toggle" class="pill" type="button" aria-pressed="false"
                  title="Toggle manual editing"><span class="rec-lamp" aria-hidden="true"></span>✎ Edit</button>
          <button id="open-save" class="pill" type="button">Save</button>
          <button id="open-load" class="pill" type="button">Load</button>
        </div>
      </div>
      <div class="name-row">
        <span id="loaded-name" class="loaded-name"></span>
      </div>
    </header>

    <div class="stage">
      <!-- Single-chord mode shows the chord once, above the grid (the grid is the
           hero, so this stays a modest label). Hidden in progression mode, where
           each bar carries its own chord. -->
      <div id="chord-head" class="chord-head" hidden><span class="c"></span></div>
      <section id="grid" class="grid" aria-label="Pattern grid"></section>
    </div>
  </main>

  <!-- The only permanently-visible controls: the things you reach for with a
       guitar in your hands. Everything else lives in the Options sheet. -->
  <div class="controls">
    <!-- Absolute/mixed-bass caution indicator: sits bottom-right, above the gear,
         so the header name row is reserved for the pattern name. -->
    <span id="type-indicator" class="type-indicator"></span>
    <div class="transport">
      <button id="play" class="btn-icon btn-play" type="button" aria-pressed="false"
              aria-label="Start metronome">&#x25B6;&#xFE0E;</button>
      <div class="slider-wrap">
        <input id="bpm" class="bpm-slider" type="range" min="40" max="240" step="1" value="90"
               aria-label="Tempo in beats per minute" />
        <div class="bpm-readout"><span id="beat-lamp" class="beat-lamp" aria-hidden="true"></span><output id="bpm-value" class="bpm-value" for="bpm">90</output> BPM</div>
      </div>
      <button id="generate" class="btn-icon btn-roll" type="button"
              aria-label="Generate a new pattern" title="Generate">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.2" y="3.2" width="17.6" height="17.6" rx="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8.4" cy="7.4" r="1.4"/><circle cx="8.4" cy="12" r="1.4"/><circle cx="8.4" cy="16.6" r="1.4"/><circle cx="15.6" cy="7.4" r="1.4"/><circle cx="15.6" cy="12" r="1.4"/><circle cx="15.6" cy="16.6" r="1.4"/></svg>
      </button>
      <button id="open-options" class="btn-icon btn-gear" type="button"
              aria-label="Options" title="Options">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.24.41.47.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.12-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Options: generation inputs (set between takes) + app-wide preferences. -->
  <div id="options-sheet" class="sheet" hidden>
    <div class="sheet-backdrop" data-close></div>
    <section class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="options-title">
      <header class="sheet-head">
        <h2 id="options-title">Options</h2>
        <button class="sheet-close" type="button" data-close aria-label="Close">✕</button>
      </header>

      <p class="sheet-sec">Generation</p>

      <!-- Row 1 is the only row whose contents change between chord modes; it
           always fills 3 slots so nothing below it ever shifts. -->
      <div class="control-row">
        <div class="field">
          <span>Chords</span>
          <div id="chord-mode" class="segmented" role="group" aria-label="Chord mode">
            <button type="button" data-mode="single" class="active">Single</button>
            <button type="button" data-mode="progression">Prog.</button>
          </div>
        </div>

        <label class="field span-2" id="field-chord">
          <span>Chord</span>
          <select id="chord"></select>
        </label>

        <label class="field" id="field-key" hidden>
          <span>Key</span>
          <select id="key"></select>
        </label>
        <label class="field" id="field-prog" hidden>
          <span>Progression</span>
          <select id="progression"></select>
        </label>
      </div>

      <div class="control-row">
        <label class="field">
          <span>Thumb</span>
          <select id="bass"></select>
        </label>
        <label class="field">
          <span>Chaos</span>
          <select id="chaos"></select>
        </label>
        <label class="field">
          <span>Pattern</span>
          <select id="pattern"></select>
        </label>
      </div>

      <p class="sheet-sec">Play sound</p>

      <!-- What Play emits: the click and the plucked pattern, independently.
           Styled as amp pilot lamps — the jewel lights when the layer is on. -->
      <div class="lamp-row">
        <label class="lamp">
          <input id="click-toggle" type="checkbox" checked />
          <span class="jewel"></span>
          <span class="t">Click</span>
        </label>
        <label class="lamp">
          <input id="pattern-toggle" type="checkbox" checked />
          <span class="jewel"></span>
          <span class="t">Notes</span>
        </label>
      </div>

      <p class="sheet-sec">Interface</p>

      <!-- The satisfying press-click on the hardware buttons. Own on/off (UI
           feedback, separate from what Play emits). -->
      <div class="lamp-row">
        <label class="lamp">
          <input id="ui-sound-toggle" type="checkbox" checked />
          <span class="jewel"></span>
          <span class="t">Button clicks</span>
        </label>
      </div>

      <p class="sheet-sec">Preferences</p>

      <div class="control-row">
        <label class="field span-2">
          <span>Note labels</span>
          <select id="label-mode"></select>
        </label>
        <label class="field">
          <span>Theme</span>
          <select id="theme"></select>
        </label>
      </div>
    </section>
  </div>

  <!-- Saved library: save the current pattern, or load/delete an existing one -->
  <div id="saved-sheet" class="sheet" hidden>
    <div class="sheet-backdrop" data-close></div>
    <section class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="saved-title">
      <header class="sheet-head">
        <h2 id="saved-title">Save</h2>
        <button class="sheet-close" type="button" data-close aria-label="Close">✕</button>
      </header>

      <div id="save-section">
        <div class="save-row">
          <input id="save-name" type="text" placeholder="Name this pattern" autocomplete="off" />
          <button id="save-btn" class="btn-primary" type="button">Save</button>
        </div>
        <div class="save-hint-row">
          <span id="save-lamp" class="save-lamp" aria-hidden="true"></span>
          <p id="save-hint" class="save-hint"></p>
        </div>
      </div>

      <ul id="saved-list" class="saved-list"></ul>
    </section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
